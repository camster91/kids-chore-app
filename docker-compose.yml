version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kids_chore_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://choreschamps:Chores2026!@postgres:5432/kids_chore_app}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://chores.ashbi.ca}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    container_name: kids_chore_app_db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-choreschamps}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-Chores2026!}
      - POSTGRES_DB=${POSTGRES_DB:-kids_chore_app}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-choreschamps} -d $${POSTGRES_DB:-kids_chore_app}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
